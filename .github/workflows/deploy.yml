name: Build & Deploy to Azure

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  IMAGE_NAME: producthub-api
  CONTAINER_APP_NAME: producthub-api
  RESOURCE_GROUP: wal2

jobs:
  # ──────────────────────────────────────────
  # Job 1 — Build & push Docker image to ACR
  # ──────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: dotnet build (compile check)
        run: dotnet build ProductHub/ProductHub.csproj -c Release --nologo

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ──────────────────────────────────────────
  # Job 2 — Deploy to Azure Container Apps
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new image to Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars "FrontendBaseUrl=https://lemon-ground-02ebc910f.6.azurestaticapps.net"
